product:
  name: product
  version: 1.0.0
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/fast/uploadPath，Linux配置 /home/fast/uploadPath）
  profile: /home/chuan/project/backend/product/uploadPath
  # 验证码类型 math: 数学运算式 char: 字符串
  captchaType: math
  pps:
    schedule:
      batch-size: 200
      progress-push-task-step: 50
      timeout-minutes: 60
      timeout-scan-delay-ms: 300000

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8081
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.product: info
    org.springframework: warn

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:change-me-in-env}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:10000ms}
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${TOKEN_SECRET:change-me-in-env}
  # 令牌有效期（默认300分钟）
  expireTime: 300

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.product.domain.entity
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml
  configuration:
    mapUnderscoreToCamelCase: true

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 登录相关
user:
  password:
    maxRetryCount: 10
    lockTime: 10

alioss:
  endpoint: ${ALIOSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${ALIOSS_ACCESS_KEY_ID:change-me-in-env}
  access-key-secret: ${ALIOSS_ACCESS_KEY_SECRET:change-me-in-env}
  bucket-name: ${ALIOSS_BUCKET_NAME:change-me-in-env}
