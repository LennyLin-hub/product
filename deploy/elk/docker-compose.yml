services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: product-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - product-elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: product-kibana
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - product-elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.3
    container_name: product-logstash
    depends_on:
      - elasticsearch
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      - product-elk

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.3
    container_name: product-filebeat
    user: root
    depends_on:
      - logstash
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ${PRODUCT_LOG_PATH:-/home/chuan/project/backend/logs}:/var/log/product:ro
    networks:
      - product-elk

volumes:
  es_data:

networks:
  product-elk:
