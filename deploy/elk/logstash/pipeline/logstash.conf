# ============================================
# Logstash 管道配置
# 功能：接收 Filebeat 收集的日志，处理标准化后写入 Elasticsearch
# ============================================

# --------------------------------------------
# INPUT - 数据输入源配置
# --------------------------------------------
input {
  # 使用 Beats 插件接收 Filebeat/Winlogbeat 等采集的数据
  beats {
    port => 5044        # 监听端口，Filebeat 配置的 output.logstash.hosts 需要对应此端口
  }
}

# --------------------------------------------
# FILTER - 数据过滤和转换
# --------------------------------------------
filter {
  # 字段复制：将自定义字段映射到 ECS (Elastic Common Schema) 标准字段
  # ECS 是 Elasticsearch 制定的日志字段命名规范，便于跨系统数据共享
  mutate {
    copy => {
      # 服务名称 -> service.name (ECS 服务名称字段)
      "service_name" => "[service][name]"
      # 运行环境 -> service.environment (如 dev/test/prod)
      "env" => "[service][environment]"
      # 日志类别 -> event.dataset (用于区分不同类型的日志，如 api/error/scheduler)
      "log_category" => "[event][dataset]"
    }
  }

  # 时间戳处理：如果日志中没有标准 @timestamp 字段，则从 timestamp 字段解析
  if ![@timestamp] and [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]    # 按 ISO8601 格式解析时间
      target => "@timestamp"                # 解析结果存入 @timestamp（ES 索引的核心时间字段）
    }
  }

  # 清理不需要的字段，移除 Filebeat 添加的元数据以减少存储空间
  mutate {
    remove_field => [
      "agent",        # Filebeat agent 信息（版本、主机名等）
      "ecs",          # ECS 版本等元数据
      "input",        # 输入源类型和配置
      "host",         # 主机信息（操作系统、架构等）
      "prospector"    # Filebeat 采集器信息（已废弃的字段）
    ]
  }
}

# --------------------------------------------
# OUTPUT - 数据输出配置
# --------------------------------------------
output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]    # ES 地址，容器内使用服务名
    # 索引命名规则：product-{日志类别}-{日期}
    # 示例：product-api-2026.03.31, product-error-2026.03.31
    # 按日期分索引便于管理和删除历史数据
    index => "product-%{[event][dataset]}-%{+YYYY.MM.dd}"
  }

  # 同时输出到控制台（调试用，生产环境可注释掉）
  stdout {
    codec => rubydebug    # 使用 rubydebug 格式输出，便于查看完整字段结构
  }
}
