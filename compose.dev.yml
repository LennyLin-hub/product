services:
  mysql:
    image: mysql:8.4
    container_name: product-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Taipei}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-product}
      MYSQL_USER: ${MYSQL_USER:-product}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --lower_case_table_names=1
      - --max_connections=300
    ports:
      - "${MYSQL_PORT:-33066}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./deploy/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./deploy/mysql/backup:/backup
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: product-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Taipei}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
      - "--requirepass"
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      - "--maxmemory"
      - ${REDIS_MAXMEMORY:-256mb}
      - "--maxmemory-policy"
      - ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      - "--databases"
      - ${REDIS_DATABASES:-16}

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: product-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:-"-Xms1g -Xmx1g"}
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: product-kibana
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.3
    container_name: product-logstash
    depends_on:
      - elasticsearch
    environment:
      LS_JAVA_OPTS: ${LS_JAVA_OPTS:-"-Xms512m -Xmx512m"}
    ports:
      - "${LOGSTASH_BEATS_PORT:-5044}:5044"
      - "${LOGSTASH_API_PORT:-9600}:9600"
    volumes:
      - ./deploy/elk/logstash/pipeline:/usr/share/logstash/pipeline:ro

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.3
    container_name: product-filebeat
    user: root
    depends_on:
      - logstash
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./deploy/elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ${PRODUCT_LOG_PATH:-./logs}:/var/log/product:ro

volumes:
  mysql_data:
  redis_data:
  es_data:
